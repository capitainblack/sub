name: Update V2Ray Subscriptions

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write      # Добавляем права на публикацию страниц
  id-token: write   # Нужно для аутентификации Pages

jobs:
  update-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run scraper
        run: python main.py # Создает файл sub.txt

      - name: Push result to Public Repo
        env:
          API_TOKEN_GITHUB: ${{ secrets.PAT_TOKEN }}
        run: |
          # 1. Клонируем публичный репозиторий в папку "public_repo"
          git clone https://capitainblack:${API_TOKEN_GITHUB}@github.com/capitainblack/pv.git public_repo
          
          # 2. Копируем свежий sub.txt в эту папку
          cp sub.txt pv/sub.txt
          
          # 3. Переходим в папку, коммитим и пушим
          cd public_repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sub.txt
          # Если изменений нет, коммит не создастся (exit 0 предотвращает ошибку)
          git commit -m "Auto-update V2Ray subscriptions" || exit 0
          git push
